<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부산대학교병원 재활의학과</title>
<style>
  :root { --brand:#1a5276; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,'Malgun Gothic',sans-serif; max-width:760px; margin:0 auto;
         padding:48px 18px; line-height:1.6; color:#222; background:#f8fafc; }
  header { text-align:center; margin-bottom:32px; }
  header h1 { color:var(--brand); margin:0 0 6px; font-size:26px; }
  header p { color:#667; margin:0; font-size:14px; }
  .grid { display:grid; gap:14px; }
  .card { display:block; padding:20px 22px; background:#fff; border:1px solid #e2e8f0;
          border-radius:14px; text-decoration:none; color:inherit; transition:.15s;
          box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .card:hover { border-color:var(--brand); box-shadow:0 4px 14px rgba(26,82,118,.12); transform:translateY(-1px); }
  .card .t { font-size:18px; font-weight:700; color:var(--brand); }
  .card .d { font-size:13.5px; color:#667; margin-top:3px; }
  .card .arrow { float:right; color:#94a3b8; font-size:18px; }
  .state { text-align:center; color:#94a3b8; padding:30px; font-size:14px; }
  footer { text-align:center; margin-top:40px; font-size:12px; color:#aab;
           border-top:1px solid #e8edf2; padding-top:16px; }
</style>
</head>
<body>
  <header>
    <h1>부산대학교병원 재활의학과</h1>
    <p>PNUHRM · 자료 포털</p>
  </header>

  <div id="list" class="grid"><div class="state">불러오는 중…</div></div>

  <footer>
    이 목록은 조직 저장소를 자동으로 읽어 표시됩니다 · &copy; PNUH Rehabilitation Medicine
  </footer>

<script>
const ORG = 'PNUHRM';

// 저장소명 → 표시할 한글 제목(선택). 없으면 저장소 description → 저장소명 순으로 사용.
const LABELS = {
  'resident-edu': '전공의 교육자료',
  // 'admin':        '행정 자료',
};

// 목록에서 숨길 저장소 (포털 자신 등)
const HIDE = new Set([ORG + '.github.io', '.github']);

async function load() {
  const el = document.getElementById('list');
  try {
    const res = await fetch(`https://api.github.com/orgs/${ORG}/repos?per_page=100&sort=full_name`);
    if (!res.ok) throw new Error('api ' + res.status);
    const repos = (await res.json())
      .filter(r => r.has_pages && !HIDE.has(r.name));

    if (!repos.length) { el.innerHTML = '<div class="state">아직 공개된 사이트가 없습니다.</div>'; return; }

    el.innerHTML = repos.map(r => {
      const title = LABELS[r.name] || r.description || r.name;
      const desc  = (LABELS[r.name] && r.description) ? r.description : '';
      const url   = `https://${ORG.toLowerCase()}.github.io/${r.name}/`;
      return `<a class="card" href="${url}">
        <span class="arrow">&rarr;</span>
        <div class="t">${title}</div>
        ${desc ? `<div class="d">${desc}</div>` : ''}
      </a>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<div class="state">목록을 불러오지 못했습니다. 잠시 후 새로고침 해주세요.</div>';
  }
}
load();
</script>
</body>
</html>
